services:
  - type: web
    name: vyapaarsage-ai-api
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: vyapaarsage_ai
      - key: JWT_SECRET
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: BUSINESS_PHONE
        sync: false
